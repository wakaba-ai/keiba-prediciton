<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wakaba AI Keiba</title>
<style>
/* ─── DESIGN TOKENS ─────────────────────────────────────────
   競馬の世界: 芝の緑、ダートの茶、勝負の赤
   パレット: ダーク競馬場ナイター感覚
──────────────────────────────────────────────────────────── */
:root {
  --bg:         #07090C;
  --panel:      #0D1117;
  --card:       #131A23;
  --border:     #1C2733;
  --border2:    #243041;

  --turf:       #00D97E;   /* 芝の緑 */
  --turf-dim:   rgba(0,217,126,.10);
  --turf-glow:  rgba(0,217,126,.25);
  --gold:       #F5C842;   /* 一着 */
  --gold-dim:   rgba(245,200,66,.10);
  --red:        #E84040;   /* 消し */
  --red-dim:    rgba(232,64,64,.10);
  --blue:       #4A9EFF;
  --blue-dim:   rgba(74,158,255,.10);
  --purple:     #A855F7;   /* SS */
  --purple-dim: rgba(168,85,247,.10);
  --orange:     #FF7A40;   /* 妙味 */
  --orange-dim: rgba(255,122,64,.10);

  --t1:  #EEF4FF;
  --t2:  #8899BB;
  --t3:  #4A5E78;
  --t4:  #2A3A50;

  --r:   8px;
  --mono: "SF Mono","Fira Code",monospace;
  --sans: -apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--t1);
  font-family:var(--sans);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ─── LAYOUT ─────────────────────────────────────────────── */
#app{display:grid;grid-template-columns:1fr;grid-template-rows:46px auto auto auto 1fr;height:100vh}
#topbar{grid-column:1;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);background:var(--panel);padding:0 16px;z-index:10}
#sortbar-wrap{background:var(--panel);border-bottom:1px solid var(--border);padding:5px 12px;display:flex;gap:4px;flex-wrap:wrap}
#racenav{background:var(--panel);border-bottom:1px solid var(--border2);padding:0 12px}
#sidebar{display:none}
#center{grid-column:1;overflow-y:auto;padding:14px 16px}
#right{display:none}

/* ─── RACE NAV ───────────────────────────────────────── */
#racenav{padding:0 12px;display:flex;flex-direction:column;gap:0}
.rnav-tabs{display:flex;gap:2px;padding:5px 0 0}
.rnav-tab{padding:5px 18px;border-radius:6px 6px 0 0;border:none;background:transparent;color:var(--t3);font-size:13px;font-weight:700;cursor:pointer;transition:all .12s}
.rnav-tab:hover{color:var(--t1);background:var(--border2)}
.rnav-tab.active{background:var(--bg);color:var(--t1);border:1px solid var(--border2);border-bottom:1px solid var(--bg);margin-bottom:-1px}
.rnav-races{display:flex;gap:4px;padding:6px 0 5px;flex-wrap:nowrap;overflow-x:auto}
.sortbar{display:flex;gap:4px;flex-wrap:wrap}
.sch{padding:3px 8px;border-radius:5px;border:1px solid var(--border2);background:transparent;
  color:var(--t3);font-size:10px;cursor:pointer;transition:all .12s}
.sch:hover{color:var(--t1);background:var(--border2)}
.sch.on{background:var(--turf);border-color:var(--turf);color:#000;font-weight:700}
.rnav-btn{min-width:52px;padding:6px 2px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--t2);font-size:12px;font-family:var(--mono);cursor:pointer;transition:all .12s;text-align:center;line-height:1.4;flex-shrink:0}
.rnav-btn:hover{background:var(--border2);color:var(--t1)}
.rnav-btn.active{background:var(--turf);border-color:var(--turf);color:#000;font-weight:700}
.rnav-btn.buy{border-color:var(--turf);color:var(--turf)}
.rnav-btn.active.buy{background:var(--turf);color:#000}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ─── TOPBAR ─────────────────────────────────────────────── */
.logo{font-weight:900;font-size:14px;letter-spacing:-.03em;color:var(--t1)}
.logo em{color:var(--turf);font-style:normal}
.logo-tag{font-size:9px;font-weight:700;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin-left:4px}
#dateTabs{display:flex;gap:4px;margin-left:16px}
.date-tab{padding:4px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;
  color:var(--t3);font-size:12px;font-weight:700;cursor:pointer;transition:all .12s;font-family:var(--mono)}
.date-tab:hover{color:var(--t1);background:var(--border2)}
.date-tab.active{background:var(--turf);border-color:var(--turf);color:#000}
#headMeta{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--t3);display:flex;gap:10px}

/* ─── VENUE TABS ─────────────────────────────────────────── */
.vtabs{display:flex;gap:0;border-bottom:1px solid var(--border);flex-shrink:0}
.vtab{padding:8px 13px;font-size:12px;font-weight:700;color:var(--t3);background:none;border:none;
  cursor:pointer;position:relative;white-space:nowrap;font-family:var(--sans)}
.vtab.on{color:var(--turf)}
.vtab.on::after{content:"";position:absolute;bottom:-1px;left:8px;right:8px;height:2px;
  background:var(--turf);border-radius:1px}
.vtab-cnt{font-size:9px;color:var(--t4);margin-left:2px;font-family:var(--mono)}

/* ─── RACE LIST ──────────────────────────────────────────── */
.ri{display:flex;align-items:center;gap:8px;padding:9px 12px;cursor:pointer;
  border-bottom:1px solid var(--border);transition:background .1s;position:relative}
.ri:hover{background:var(--card)}
.ri.on{background:var(--turf-dim);border-left:2px solid var(--turf)}
.ri-no{width:26px;height:26px;border-radius:6px;background:var(--border);
  color:var(--t2);font-family:var(--mono);font-weight:800;font-size:11px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ri.on .ri-no{background:var(--turf);color:#003320}
.ri-body{flex:1;min-width:0}
.ri-g{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ri-m{font-size:10px;color:var(--t3);font-family:var(--mono)}
.ri-bgs{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap}
.ri-t{font-family:var(--mono);font-size:10px;color:var(--t3);flex-shrink:0}

/* ─── BADGES ─────────────────────────────────────────────── */
.badge{font-size:8.5px;font-weight:800;padding:2px 5px;border-radius:3px;white-space:nowrap}
.badge.buy{background:var(--turf-dim);color:var(--turf);border:1px solid rgba(0,217,126,.3)}
.badge.skip{background:var(--border);color:var(--t3)}
.badge.hot{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(255,122,64,.3)}
.badge.ss{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(168,85,247,.3)}
.badge.front{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(245,200,66,.3)}

/* ─── RACE HEADER ────────────────────────────────────────── */
.rh{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 16px;margin-bottom:14px}
.rh-top{display:flex;align-items:flex-start;gap:12px}
.rh-no{width:40px;height:40px;border-radius:8px;background:var(--border2);color:var(--t1);
  font-family:var(--mono);font-weight:800;font-size:16px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0}
.rh-title{font-size:15px;font-weight:800;line-height:1.2}
.rh-meta{font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:3px}

/* 展開バナー */
.verdict-bar{margin-top:12px;border-radius:6px;padding:10px 13px;font-size:12px;line-height:1.7}
.verdict-bar.front{background:var(--gold-dim);border-left:3px solid var(--gold)}
.verdict-bar.diff{background:var(--blue-dim);border-left:3px solid var(--blue)}
.verdict-bar.mid{background:var(--turf-dim);border-left:3px solid var(--turf)}
.verdict-bar.skip-b{background:var(--red-dim);border-left:3px solid var(--red)}
.verdict-bar .vb-tag{font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  display:block;margin-bottom:2px}
.verdict-bar.front .vb-tag{color:var(--gold)}
.verdict-bar.diff .vb-tag{color:var(--blue)}
.verdict-bar.mid .vb-tag{color:var(--turf)}
.verdict-bar.skip-b .vb-tag{color:var(--red)}
.verdict-bar b{color:var(--t1)}
.verdict-bar .vb-sub{color:var(--t2);font-size:11px}

/* 買い/見送りバナー */
.buy-bar{margin-top:8px;border-radius:6px;padding:8px 13px;font-size:12px}
.buy-bar.yes{background:rgba(0,217,126,.06);border:1px solid rgba(0,217,126,.2)}
.buy-bar.no{background:rgba(232,64,64,.06);border:1px solid rgba(232,64,64,.2)}
.buy-bar.yes b{color:var(--turf)}
.buy-bar.no b{color:var(--red)}

/* ─── SORT CHIPS ─────────────────────────────────────────── */

.sch{padding:4px 10px;border-radius:99px;border:1px solid var(--border);
  background:var(--card);color:var(--t3);font-size:10px;font-weight:600;
  cursor:pointer;white-space:nowrap}
.sch.on{background:var(--turf-dim);border-color:var(--turf);color:var(--turf)}

/* ─── HORSE TABLE ─────────────────────────────────────────── */
.ht-wrap{overflow:auto;border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px}
.ht{border-collapse:separate;border-spacing:0;width:100%;min-width:860px;font-size:11.5px}
.ht th{background:var(--panel);color:var(--t3);font-weight:700;font-size:9.5px;padding:6px 7px;
  text-align:center;white-space:nowrap;cursor:pointer;user-select:none;position:sticky;top:0;z-index:3;
  border-bottom:1px solid var(--border);letter-spacing:.04em}

.ht td{padding:6px 7px;border-bottom:1px solid var(--border);text-align:center;
  white-space:nowrap;vertical-align:middle}
.ht tr:last-child td{border-bottom:none}

/* 消し馬: 半透明 */
.ht tr.keshi td{opacity:.35}
.ht tr.keshi td:nth-child(1),.ht tr.keshi td:nth-child(2){opacity:.6}

/* 脚質カラム: 逃げ/先行を強調 */
.kyaku-0{color:var(--red);font-weight:800}     /* 逃げ */
.kyaku-1{color:var(--gold);font-weight:800}    /* 先行 */
.kyaku-2{color:var(--t2)}                       /* 中団 */
.kyaku-3{color:var(--t4)}                       /* 追込 */
/* 馬名セル */
.ht-name{text-align:left;font-weight:800;font-size:12.5px}
.ht-name .sub{display:block;font-size:9.5px;color:var(--t3);font-weight:400;margin-top:1px}
.ht-name .ktags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.ktag{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;
  background:var(--red-dim);color:var(--red)}
/* 数値セル */
.num-ab{font-family:var(--mono);font-weight:800;font-size:14px;color:var(--turf)}
.num-pl{font-family:var(--mono);font-weight:800;font-size:14px;color:var(--gold)}
.num-od,.num-ab,.num-pl,.num-ev,.num-my{font-family:var(--mono);font-weight:700;font-size:11px}
.num-od{min-width:44px}
.num-ev{font-family:var(--mono);font-weight:800}
.num-ev.good{color:var(--orange)}
.num-my{font-family:var(--mono);font-weight:800}
.num-my.high{color:var(--purple)}
/* 自信度バッジ */
.conf{min-width:28px;height:20px;padding:0 7px;border-radius:99px;display:inline-flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-weight:800;font-size:10px;flex-shrink:0;letter-spacing:.03em}
.conf.SS{background:var(--purple);color:#fff}
.conf.S{background:var(--gold);color:#1a1200}
.conf.A{background:var(--turf);color:#001a0e}
.conf.B{background:var(--blue);color:#fff}
.conf.C{background:var(--t4);color:var(--t2)}
.conf.D{background:#0f1823;color:var(--t4)}
/* 枠番カラー */
.wb{width:22px;height:22px;border-radius:4px;display:inline-flex;align-items:center;
  justify-content:center;font-family:var(--mono);font-weight:800;font-size:11px}
.w1{background:#f0f0f0;color:#000}.w2{background:#222;color:#fff}.w3{background:#c0392b;color:#fff}
.w4{background:#2980b9;color:#fff}.w5{background:#f39c12;color:#000}.w6{background:#27ae60;color:#fff}
.w7{background:#e67e22;color:#fff}.w8{background:#e91e8c;color:#fff}
/* 過去走セル */
.past-cell{text-align:left;font-family:var(--mono);font-size:9.5px;color:var(--t3);min-width:70px}
.pc1{color:var(--gold);font-weight:800}.pc23{color:var(--turf);font-weight:700}

/* ─── 展開図 ─────────────────────────────────────────────── */
.pace-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 14px;margin-bottom:14px}
.pace-title{font-size:10px;font-weight:800;color:var(--t3);letter-spacing:.1em;
  text-transform:uppercase;margin-bottom:10px}
.pace-lanes{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.lane{background:var(--panel);border-radius:6px;padding:8px}
.lane-h{font-size:9px;font-weight:800;text-align:center;letter-spacing:.06em;margin-bottom:6px}
.lane-h.L0{color:var(--red)}.lane-h.L1{color:var(--gold)}
.lane-h.L2{color:var(--t2)}.lane-h.L3{color:var(--t3)}
.lane-h .lc{font-size:8px;font-family:var(--mono);margin-left:2px}
.lane-horse{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.lane-horse.keshi .lh-name{text-decoration:line-through;color:var(--t4)}
.lh-name{font-size:10.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* 逃げ・先行の馬は強調枠 */
.lane-horse.front-flag .lh-name{color:var(--gold);font-weight:700}

/* ─── RIGHT PANEL ────────────────────────────────────────── */
.sec{margin-bottom:18px}
.sec-h{font-size:9.5px;font-weight:800;color:var(--t3);letter-spacing:.1em;
  text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sec-h::before{content:"";width:3px;height:10px;border-radius:2px;flex-shrink:0}
.sec-h.green::before{background:var(--turf)}
.sec-h.gold::before{background:var(--gold)}
.sec-h.red::before{background:var(--red)}
.sec-h.purple::before{background:var(--purple)}
.sec-h.orange::before{background:var(--orange)}

/* 本命カード */
.hm-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:11px;margin-bottom:7px}
.hm-card.top{border-color:rgba(0,217,126,.25);background:rgba(0,217,126,.03)}
.hm-card.myomi{border-color:rgba(168,85,247,.25);background:rgba(168,85,247,.03)}
.hm-top{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.hm-name-block{flex:1;min-width:0}
.hm-name{font-size:13px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hm-jockey{font-size:10.5px;font-weight:400;color:var(--t2);margin-left:5px}
.hm-kyaku{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px}
.kyaku-0.hm-kyaku{background:var(--red-dim);color:var(--red)}
.kyaku-1.hm-kyaku{background:var(--gold-dim);color:var(--gold)}
.kyaku-2.hm-kyaku{background:var(--border);color:var(--t2)}
.kyaku-3.hm-kyaku{background:#0a1020;color:var(--t3)}
.hm-probs{display:flex;gap:5px}
.pp{padding:3px 8px;border-radius:99px;font-family:var(--mono);font-weight:800;font-size:11.5px}
.pp.win{background:var(--turf-dim);color:var(--turf)}
.pp.pla{background:var(--gold-dim);color:var(--gold)}
.hm-reason{font-size:10.5px;color:var(--t2);line-height:1.6;padding:6px 8px;
  background:var(--panel);border-radius:5px;margin-bottom:7px}
.hm-stats{display:flex;gap:5px}
.hm-stat{flex:1;text-align:center;padding:5px;border-radius:5px;background:var(--panel)}
.hm-stat.good{background:var(--orange-dim)}
.hm-stat .sk{font-size:8.5px;color:var(--t3);letter-spacing:.04em;text-transform:uppercase}
.hm-stat .sv{font-family:var(--mono);font-weight:800;font-size:12px;margin-top:1px}
.hm-stat.good .sv{color:var(--orange)}

/* 消し馬 */
.ki{display:flex;align-items:flex-start;gap:7px;padding:7px;border-radius:6px;
  background:var(--card);margin-bottom:5px;border:1px solid var(--border)}
.ki-name{font-size:11.5px;font-weight:700}
.ki-reasons{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}

/* 買い目 */
.bg{margin-bottom:9px}
.bg-label{font-size:9.5px;font-weight:800;color:var(--gold);letter-spacing:.06em;margin-bottom:4px}
.br{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;
  background:var(--card);margin-bottom:3px;border:1px solid transparent}
.br.rec{background:var(--orange-dim);border-color:rgba(255,122,64,.25)}
.br-combo{font-family:var(--mono);font-weight:700;flex:1;font-size:12px}
.br-hit{font-family:var(--mono);font-size:9.5px;color:var(--t3)}
.br-od{font-family:var(--mono);font-size:9.5px;color:var(--t3)}
.br-ev{font-family:var(--mono);font-weight:800;font-size:10.5px;color:var(--t3)}
.br-ev.good{color:var(--orange)}
.br-cr{font-size:9px;font-weight:800}

/* 見送り */
.empty{text-align:center;padding:24px;color:var(--t4)}
.empty .ei{font-size:20px;margin-bottom:6px;opacity:.4}

/* フッター */
.disc{font-size:9px;color:var(--t4);padding:14px 16px;text-align:center;
  line-height:1.8;border-top:1px solid var(--border);margin-top:8px}
.ht{border-collapse:collapse;white-space:nowrap}
.ht td,.ht th{position:relative}
/* 固定列: 番・馬名・騎手・脚質 */
.ht-wrap{overflow-x:auto;position:relative}
.ht{border-collapse:separate;border-spacing:0;white-space:nowrap;table-layout:fixed}
.ht th,.ht td{box-sizing:border-box}
/* 固定列 */
.ht th:nth-child(1),.ht td:nth-child(1){position:sticky;left:0;z-index:3;background:var(--panel);width:32px;min-width:32px}
.ht th:nth-child(2),.ht td:nth-child(2){position:sticky;left:32px;z-index:3;background:var(--panel);width:150px;min-width:150px}
.ht th:nth-child(3),.ht td:nth-child(3){position:sticky;left:182px;z-index:3;background:var(--panel);width:75px;min-width:75px}
.ht th:nth-child(4),.ht td:nth-child(4){position:sticky;left:257px;z-index:3;background:var(--panel);width:38px;min-width:38px;border-right:2px solid var(--border2)}
.ht tr:hover td{background:var(--border2)!important}
.ht tr.keshi td{opacity:.45}
</style>
</head>
<body>
<div id="app">

<!-- TOPBAR -->
<div id="topbar">

  <div class="logo"><em>●</em> Wakaba AI Keiba</div>
  <div id="dateTabs"></div>
  <div id="headMeta">
    <span id="headDate">—</span>
    <span id="genTime"></span>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar"></div>
<div id="racenav"></div>
<div id="sortbar-wrap"></div>
<div class="sortbar" id="sortbar"></div>

<!-- CENTER -->
<div id="center">
  <div id="raceHeader"></div>
  <div class="ht-wrap"><table class="ht"><thead id="hthead"></thead><tbody id="htbody"></tbody></table></div>
  <div id="paceDiv"></div>
  <div class="disc">当サイトはAI予測情報です。馬券の購入は自己責任で。</div>
</div>

<!-- RIGHT -->
<div id="right">
  <div class="sec" id="rVerdict"></div>
  <div class="sec" id="rHonmei"></div>
  <div class="sec" id="rKeshi"></div>
  <div class="sec" id="rBets"></div>
</div>

</div><!-- #app -->

<script>
'use strict';
let DATA=null, curVenue=null, curRace=null, curSort='conf', curDir=-1;
const $ = id => document.getElementById(id);
const pct = v => v==null?'—':Number(v).toFixed(0);
const f2  = v => v==null?'—':Number(v).toFixed(2);
const f3  = v => v==null?'—':Number(v).toFixed(3);

// 枠番カラー
function wb(u, w){ return `<span class="wb w${w||1}">${u}</span>`; }

// 脚質ラベル
const KYAKU_LABEL = {0:'逃',1:'先',2:'中',3:'追'};
const KYAKU_CLS   = {0:'kyaku-0',1:'kyaku-1',2:'kyaku-2',3:'kyaku-3'};
function kyakuHtml(k){ const l=KYAKU_LABEL[k]||'—',c=KYAKU_CLS[k]||''; return `<span class="${c}" style="font-family:var(--mono);font-weight:800;font-size:12px">${l}</span>`; }

// 自信度バッジ
function confHtml(r){ return `<span class="conf ${r||'D'}">${r||'D'}</span>`; }

// 過去走セル
function pastCell(p){
  if(!p) return '<td class="past-cell">—</td>';
  const cls = p.chakujun===1?'pc1':(p.chakujun<=3?'pc23':'');
  return `<td class="past-cell"><span class="${cls}">${p.chakujun||'?'}</span>/${p.atama||'?'} ${p.place||''}${p.surface||''}${p.distance||''}<br>${p.kyaku||'?'} 上${p.agari!=null?p.agari.toFixed(1):'?'}</td>`;
}

// 調教コメント
function trainingVal(h){
  const c=h.training_comment||'';
  const s=(c.match(/坂路終い([\d.]+)/)||[])[1];
  const w=(c.match(/ウッド終い([\d.]+)/)||[])[1];
  const parts=[];
  if(s) parts.push(`坂${s}`);
  if(w) parts.push(`W${w}`);
  return parts.length?parts.join(' '):(h.training_score!=null?`${Number(h.training_score).toFixed(0)}pt`:'—');
}

// ─── SORT ──────────────────────────────────────────────────
const SORT_DEFS = [
  {k:'umaban',l:'馬番'},{k:'odds',l:'オッズ'},{k:'conf',l:'自信度'},
  {k:'ability',l:'AI勝率'},{k:'place',l:'AI複勝率'},{k:'ev',l:'EV'},
  {k:'kyaku',l:'脚質'},{k:'speed',l:'速度'},{k:'agari',l:'上り'},
  {k:'blood',l:'血統'},{k:'waku',l:'枠順'},{k:'training',l:'調教'},{k:'mining',l:'指数'},
];
function sortKey(h){
  const m={
    conf:    ()=>h.confidence_score??-1,
    ability: ()=>h.p_ability??-1,
    place:   ()=>h.p_place??-1,
    myomi:   ()=>h.myomi_score??-1,
    ev:      ()=>(h.ev_tansho!=null&&!h.ev_tansho_anomaly)?h.ev_tansho:-1,
    odds:    ()=>h.tansho_odds!=null?-h.tansho_odds:-9999,
    kyaku:   ()=>-(h.kyaku_code??9),
    umaban:  ()=>-(h.umaban??99),
    fit:      ()=>h.fit_score??-1,
    speed:    ()=>h.prev_speed_index??h.avg_speed_index??(h.past_races?.[0]?.speed_index??-1),
    agari:    ()=>h.agari_rank_avg!=null?-h.agari_rank_avg:-99,
    blood:    ()=>h.blood_stamina_score??-1,
    waku:     ()=>h.waku_win_rate??-1,
    training: ()=>h.training_score??-1,
    mining:   ()=>h.mining??-1,
  };
  return (m[curSort]||m.conf)();
}
function doSort(arr){ const s=[...arr].sort((a,b)=>sortKey(b)-sortKey(a)); return curDir===-1?s:s.reverse(); }

// ─── RENDER RACE HEADER ────────────────────────────────────
function renderHeader(r){
  const rv = r.race_verdict||{};
  // 展開バナー種別
  let vclass='mid', vtag='展開';
  if(rv.front_ok && rv.pace_type!=='unclear'){vclass='front';vtag='前残り有利';}
  else if(!rv.front_ok && rv.pace_type==='high'){vclass='diff';vtag='差し有利';}
  else if(rv.pace_type==='unclear'){vclass='mid';vtag='展開不明';}

  const verdictHtml = rv.verdict ? `
    <div class="verdict-bar ${vclass}">
      <span class="vb-tag">${vtag}</span>
      <b>${rv.pace_label||''}</b> · ${rv.course_label||''}<br>
      <span class="vb-sub">→ ${rv.verdict||''}</span>
    </div>` : '';

  const buyHtml = r.buy_flag && !r.skip
    ? `<div class="buy-bar yes"><b>◎ 買い推奨</b> — ${r.buy_reason||''}</div>`
    : r.skip
    ? `<div class="buy-bar no"><b>⚠ 見送り</b> — ${r.skip_reason||''}</div>`
    : `<div class="buy-bar no"><b>— 見送り推奨</b> — ${r.buy_reason||''}</div>`;

  $('raceHeader').innerHTML = `
    <div class="rh">
      <div class="rh-top">
        <div class="rh-no">${r.race_no}R</div>
        <div>
          <div class="rh-title">${r.grade||'—'}</div>
          <div class="rh-meta">${r.place} ${r.surface}${r.distance}m · ${r.atama}頭 · ${r.baba||'良'} · 発走 ${r.start_time||'—'}</div>
        </div>
      </div>
      ${verdictHtml}${buyHtml}
    </div>`;
}

// ─── RENDER PACE DIAGRAM ───────────────────────────────────
function renderPace(r){
  const rv = r.race_verdict||{};
  const lanes = [[],[],[],[]];
  r.horses.forEach(h=>{ const k=h.kyaku_code??2; lanes[Math.min(k,3)].push(h); });
  const lnames=['逃げ','先行','中団','追込'];
  const lcls=['L0','L1','L2','L3'];

  const lanesHtml = lanes.map((arr,i)=>{
    const horses = arr.sort((a,b)=>b.p_ability-a.p_ability)
      .map(h=>{
        const isFront = i<=1;
        return `<div class="lane-horse ${h.is_keshi?'keshi':''} ${isFront?'front-flag':''}">
          ${wb(h.umaban,h.waku)}
          <span class="lh-name">${h.horse_name}</span>
        </div>`;
      }).join('') || `<div style="color:var(--t4);font-size:9.5px;text-align:center">—</div>`;
    return `<div class="lane"><div class="lane-h ${lcls[i]}">${lnames[i]} <span class="lc">${arr.length}</span></div>${horses}</div>`;
  }).join('');

  $('paceDiv').innerHTML = `
    <div class="pace-card">
      <div class="pace-title">🏇 展開図 — ${rv.verdict||'—'}</div>
      <div class="pace-lanes">${lanesHtml}</div>
    </div>`;
}

// ─── 能力ランク計算（レース内相対順位）──────────────────────
const RK_DEFS = [
  {k:'speed',  l:'速', fn: h=>h.prev_speed_index??h.avg_speed_index??null},
  {k:'agari',  l:'上', fn: h=>h.agari_rank_avg!=null?-h.agari_rank_avg:null},
  {k:'jockey', l:'騎', fn: h=>h.jockey_win_rate??null},
  {k:'trainer',l:'厩', fn: h=>h.trainer_win_rate??null},
  {k:'blood',  l:'血', fn: h=>h.blood_stamina_score??null},
  {k:'waku',   l:'枠', fn: h=>h.waku_win_rate??null},
  {k:'train',  l:'調', fn: h=>h.training_score??null},
  {k:'mining', l:'指', fn: h=>h.mining??null},
];

function computeRanks(horses){
  const ranks = {};
  horses.forEach(h=>ranks[h.umaban]={});
  RK_DEFS.forEach(({k, fn})=>{
    const vals = horses.map(h=>({u:h.umaban, v:fn(h)})).filter(x=>x.v!=null);
    vals.sort((a,b)=>b.v-a.v);
    const n = vals.length;
    vals.forEach((x,i)=>{
      const p = n>1 ? i/(n-1) : 0;
      ranks[x.u][k] = p<=.1?'S': p<=.3?'A': p<=.6?'B': p<=.85?'C': 'D';
    });
  });
  return ranks;
}

let ALL_DATA = [];

async function load(){
  // manifest.json から公開済み日付一覧を取得
  let dates = [];
  try{
    const mres = await fetch('manifest.json', {cache:'no-store'});
    if(mres.ok){
      const m = await mres.json();
      dates = m.dates || [];
    }
  }catch(e){ /* manifest.jsonなし */ }

  const candidates = dates.map(d=>`predictions_${d}.json`);
  if(candidates.length === 0) candidates.push('predictions.json');  // フォールバック

  const loaded = [];
  for(const fname of candidates){
    try{
      const res = await fetch(fname, {cache:'no-store'});
      if(!res.ok) continue;
      const json = await res.json();
      if(json && json.races && json.races.length && !loaded.some(x=>x.date===json.date)){
        loaded.push(json);
      }
    }catch(e){}
  }

  if(loaded.length === 0){
    $('center').innerHTML='<div class="empty"><div class="ei">⚠</div><p>predictions.json を読み込めませんでした</p></div>';
    return;
  }

  loaded.sort((a,b)=>a.date.localeCompare(b.date));
  ALL_DATA = loaded;
  DATA = loaded[0];

  // 日付タブ描画（2日以上ある場合のみ表示）
  const dt = $('dateTabs');
  if(dt){
    if(loaded.length > 1){
      dt.innerHTML = loaded.map((d2,i)=>{
        const label = `${d2.date.slice(4,6)}/${d2.date.slice(6,8)}`;
        return `<button class="date-tab${i===0?' active':''}" data-i="${i}">${label}</button>`;
      }).join('');
      dt.querySelectorAll('.date-tab').forEach(btn=>{
        btn.onclick = ()=>{
          dt.querySelectorAll('.date-tab').forEach(b=>b.classList.remove('active'));
          btn.classList.add('active');
          DATA = ALL_DATA[parseInt(btn.dataset.i)];
          window._navVenue = null;
          renderAfterDateChange();
        };
      });
    } else {
      dt.innerHTML = '';
    }
  }

  renderAfterDateChange();
}

function renderAfterDateChange(){
  // sortbar描画
  const sw = $('sortbar-wrap');
  if(sw){
    sw.innerHTML = '<span style="font-size:10px;color:var(--t3);font-weight:700;align-self:center;margin-right:4px">ソート:</span>' +
      SORT_DEFS.map(({k,l})=>
        `<button class="sch ${curSort===k?'on':''}" data-s="${k}">${l}</button>`
      ).join('');
    sw.querySelectorAll('.sch').forEach(c=>{
      c.onclick = ()=>{
        if(curSort===c.dataset.s) curDir=-curDir;
        else{curSort=c.dataset.s;curDir=-1;}
        sw.querySelectorAll('.sch').forEach(x=>x.classList.toggle('on',x.dataset.s===curSort));
        if(curRace) renderTable(curRace);
      };
    });
  }
  const d=DATA.date||'';
  if(d) $('headDate').textContent=`${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}`;
  if(DATA.generated_at){
    const t=new Date(DATA.generated_at);
    $('genTime').textContent=`生成 ${t.getHours()}:${String(t.getMinutes()).padStart(2,'0')}`;
  }
  renderVenueTabs();
  renderSidebar();
  const first=DATA.races.sort((a,b)=>a.race_no-b.race_no)[0];
  if(first) selectRace(first.race_id);
}
load();
</script>
</body>
</html>
