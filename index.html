<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hara AI Keiba — No-Odds 予測</title>
<style>
:root{
  --bg:#0E1116; --surface:#161B22; --surface2:#1C232C; --line:#232B36;
  --turf:#1FA463; --gold:#E8B84B; --text:#E6EDF3; --dim:#8B949E; --faint:#5A6371;
  --s:#E8B84B; --a:#1FA463; --b:#3B82F6; --c:#8B949E; --d:#4A5160; --ev:#F2683C;
  --r:14px;
  --mono:"SFMono-Regular",ui-monospace,"DejaVu Sans Mono",Menlo,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{padding-bottom:30px}
.wrap{max-width:760px;margin:0 auto;padding:0 14px}
header{position:sticky;top:0;z-index:40;background:rgba(14,17,22,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.head-in{max-width:760px;margin:0 auto;padding:11px 14px;display:flex;align-items:center;gap:10px}
.logo{display:flex;align-items:baseline;gap:7px;font-weight:800;letter-spacing:-.02em}
.logo .mk{color:var(--turf);font-size:19px}
.logo .sub{color:var(--dim);font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase}
.head-date{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--dim)}
.venues{position:sticky;top:49px;z-index:39;background:rgba(14,17,22,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.venues-in{max-width:760px;margin:0 auto;display:flex;overflow-x:auto;padding:0 8px;scrollbar-width:none}
.venues-in::-webkit-scrollbar{display:none}
.vtab{flex:0 0 auto;padding:13px 18px;font-size:14px;font-weight:700;color:var(--dim);background:none;border:none;cursor:pointer;position:relative;font-family:var(--sans)}
.vtab.on{color:var(--text)}
.vtab.on::after{content:"";position:absolute;left:16px;right:16px;bottom:-1px;height:2.5px;background:var(--turf);border-radius:2px}
.vtab .cnt{font-size:10px;color:var(--faint);font-family:var(--mono);margin-left:4px}
.filterbar{display:flex;gap:7px;overflow-x:auto;padding:12px 0 4px;scrollbar-width:none}
.filterbar::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:7px 13px;border-radius:99px;border:1px solid var(--line);background:var(--surface);color:var(--dim);font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--turf);border-color:var(--turf);color:#06150d}
/* レース番号クイックボタン */
.rnav{display:flex;gap:6px;overflow-x:auto;padding:10px 0 2px;scrollbar-width:none}
.rnav::-webkit-scrollbar{display:none}
.rnav-btn{flex:0 0 auto;width:34px;height:34px;border-radius:8px;border:1px solid var(--line);
  background:var(--surface);color:var(--dim);font-family:var(--mono);font-weight:800;font-size:13px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative}
.rnav-btn.hot{border-color:rgba(242,104,60,.4)}
.rnav-btn.hot::after{content:"";position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--ev)}
/* 表示モード切替(評価/馬柱) */
.modesw{display:flex;gap:0;background:var(--surface2);border-radius:9px;padding:3px;margin:16px 0 4px}
.modesw button{flex:1;padding:8px;border:none;background:none;color:var(--dim);font-weight:700;
  font-size:13px;border-radius:7px;cursor:pointer;font-family:var(--sans)}
.modesw button.on{background:var(--turf);color:#06150d}
/* 馬柱テーブル */
.umaba-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:10px}
.umaba{border-collapse:collapse;width:100%;font-size:11.5px;font-family:var(--mono);min-width:560px}
.umaba th{background:var(--surface2);color:var(--dim);font-weight:700;padding:7px 6px;text-align:center;
  position:sticky;left:0;font-size:10px;white-space:nowrap}
.umaba td{padding:7px 6px;text-align:center;border-bottom:1px solid var(--line);white-space:nowrap}
.umaba .horse-cell{text-align:left;position:sticky;left:0;background:var(--surface);z-index:2;min-width:120px}
.umaba .hn{font-family:var(--sans);font-weight:700;font-size:12.5px;display:flex;align-items:center;gap:6px}
.umaba tr:hover td{background:var(--surface2)}
.umaba .past{color:var(--dim)}
.umaba .chaku1{color:var(--gold);font-weight:800}
.umaba .chaku23{color:var(--turf);font-weight:700}
.pr-cell{line-height:1.4}
.pr-cell .top{font-weight:700;color:var(--text)}
.pr-cell .bot{font-size:10px;color:var(--faint)}
.section-pad{padding:14px 0}
.rcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:11px;cursor:pointer;transition:border-color .15s,transform .1s}
.rcard:active{transform:scale(.992)}
.rcard-top{display:flex;align-items:center;gap:11px;margin-bottom:12px}
.rno{font-family:var(--mono);font-weight:800;font-size:15px;color:var(--bg);background:var(--text);width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rmeta{flex:1;min-width:0}
.rmeta .nm{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rmeta .sub{font-size:11.5px;color:var(--dim);margin-top:1px;font-family:var(--mono)}
.rtime{text-align:right;flex-shrink:0}
.rtime .t{font-family:var(--mono);font-size:13px;font-weight:700}
.rtime .lbl{font-size:9px;color:var(--faint)}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px}
.bdg{font-size:10.5px;font-weight:700;padding:3px 8px;border-radius:6px}
.bdg.hot{background:rgba(242,104,60,.16);color:var(--ev);border:1px solid rgba(242,104,60,.3)}
.bdg.skip{background:rgba(90,99,113,.15);color:var(--dim);border:1px solid var(--line)}
.bdg.axis{background:rgba(31,164,99,.14);color:var(--turf)}
.top3{display:flex;flex-direction:column;gap:6px}
.t3row{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:9px;background:var(--surface2)}
.conf{width:21px;height:21px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;font-family:var(--mono)}
.conf.S{background:var(--s);color:#241a02}.conf.A{background:var(--a);color:#06150d}.conf.B{background:var(--b);color:#fff}.conf.C{background:var(--c);color:#1a1f27}.conf.D{background:var(--d);color:#aab2bd}
.umaban{width:23px;height:23px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;font-family:var(--mono)}
.t3name{flex:1;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.t3rate{font-family:var(--mono);font-size:12px;color:var(--dim);flex-shrink:0}
.t3rate b{color:var(--turf)}
.w1{background:#fff;color:#000}.w2{background:#2b2b2b;color:#fff}.w3{background:#E5534B;color:#fff}.w4{background:#3B82F6;color:#fff}.w5{background:#E8B84B;color:#000}.w6{background:#1FA463;color:#fff}.w7{background:#F2683C;color:#fff}.w8{background:#EC6CB9;color:#fff}
#detail{display:none}
.det-head{display:flex;align-items:center;gap:10px;padding:14px 0 6px}
.backbtn{background:var(--surface);border:1px solid var(--line);color:var(--text);border-radius:9px;padding:7px 13px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--sans);flex-shrink:0}
.det-title{font-weight:800;font-size:17px}
.det-sub{font-family:var(--mono);font-size:11.5px;color:var(--dim);margin-top:1px}
.det-nav{display:flex;gap:8px;margin-left:auto}
.navb{background:var(--surface);border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:7px 13px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--sans)}
.sec-lbl{font-size:11px;font-weight:800;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin:18px 0 9px;display:flex;align-items:center;gap:8px}
.sec-lbl::before{content:"";width:3px;height:13px;background:var(--turf);border-radius:2px}
.sec-lbl.gold::before{background:var(--gold)}
.hcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:10px}
.hcard-top{display:flex;align-items:center;gap:10px}
.hc-rank{font-family:var(--mono);font-weight:800;font-size:13px;color:var(--dim);width:24px;text-align:center;flex-shrink:0}
.hc-main{flex:1;min-width:0}
.hc-name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hc-info{font-size:11px;color:var(--dim);font-family:var(--mono);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dual{display:flex;gap:8px;flex-shrink:0}
.ring{width:50px;text-align:center}
.ring svg{width:46px;height:46px;display:block;margin:0 auto}
.ring .lbl{font-size:8.5px;color:var(--faint);letter-spacing:.04em;margin-top:1px;text-transform:uppercase}
.ring .val{font-family:var(--mono);font-size:13px;font-weight:800}
.hc-reason{margin-top:10px;padding:9px 11px;background:var(--surface2);border-radius:9px;font-size:12.5px;line-height:1.6}
.hc-reason .tag{color:var(--turf);font-weight:700;font-size:10.5px;letter-spacing:.05em;display:block;margin-bottom:3px;text-transform:uppercase}
.hc-stats{display:flex;flex-wrap:wrap;gap:4px;margin-top:9px}
.stat{font-family:var(--mono);font-size:11px;background:var(--surface2);border-radius:6px;padding:4px 8px;color:var(--dim)}
.stat b{color:var(--text);font-weight:700}
.hc-ev{display:flex;gap:7px;margin-top:9px}
.evbox{flex:1;text-align:center;padding:7px;border-radius:8px;background:var(--surface2)}
.evbox .k{font-size:9px;color:var(--faint);letter-spacing:.04em;text-transform:uppercase}
.evbox .v{font-family:var(--mono);font-size:14px;font-weight:800;margin-top:1px}
.evbox.good{background:rgba(242,104,60,.12)}.evbox.good .v{color:var(--ev)}
.bet-type-grp{margin-bottom:11px}
.bet-type-lbl{font-size:11px;font-weight:800;color:var(--gold);letter-spacing:.06em;margin-bottom:6px}
.bet-row{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:8px;background:var(--surface2);margin-bottom:5px;font-size:12.5px}
.bet-row.rec{background:rgba(242,104,60,.1);border:1px solid rgba(242,104,60,.28)}
.bet-combo{font-family:var(--mono);font-weight:700;flex:1}
.bet-stat{font-family:var(--mono);font-size:11.5px;color:var(--dim)}
.bet-ev{font-family:var(--mono);font-weight:800;font-size:12.5px}
.bet-ev.good{color:var(--ev)}
.empty{text-align:center;padding:50px 20px;color:var(--faint)}
.empty .ic{font-size:30px;margin-bottom:10px;opacity:.5}
.disclaimer{text-align:center;font-size:10.5px;color:var(--faint);padding:24px 14px 10px;line-height:1.7}
</style>
</head>
<body>
<header><div class="head-in">
  <div class="logo"><span class="mk">●</span>Hara AI Keiba<span class="sub">No-Odds</span></div>
  <div class="head-date" id="headDate">—</div>
</div></header>

<div class="venues" id="venues"><div class="venues-in" id="venuesIn"></div></div>

<div class="wrap">
  <div id="list">
    <div class="rnav" id="rnav"></div>
    <div class="filterbar">
      <button class="chip on" data-f="all">すべて</button>
      <button class="chip" data-f="hot">激熱のみ</button>
      <button class="chip" data-f="w30">勝率30%↑</button>
      <button class="chip" data-f="p60">複勝60%↑</button>
      <button class="chip" data-f="active">買い目あり</button>
    </div>
    <div class="section-pad" id="raceList"></div>
  </div>
  <div id="detail">
    <div class="det-head">
      <button class="backbtn" onclick="showView('list')">← 戻る</button>
      <div><div class="det-title" id="detTitle">—</div><div class="det-sub" id="detSub">—</div></div>
      <div class="det-nav"><button class="navb" id="prevR">←</button><button class="navb" id="nextR">→</button></div>
    </div>
    <div class="section-pad">
      <div class="modesw">
        <button id="modeEval" class="on" onclick="setMode('eval')">評価</button>
        <button id="modeUma" onclick="setMode('uma')">馬柱</button>
      </div>
      <div id="evalMode">
        <div class="sec-lbl">全馬評価</div>
        <div id="horseList"></div>
        <div class="sec-lbl gold">買い目</div>
        <div id="betBlock"></div>
      </div>
      <div id="umaMode" style="display:none">
        <div class="sec-lbl">馬柱（過去走）</div>
        <div class="umaba-wrap" id="umabaBox"></div>
      </div>
    </div>
  </div>
</div>

<div class="disclaimer">本サイトはAIによる予測情報です。馬券の購入は自己責任で。<br>No-Odds予測 = オッズに依存しない独自の能力評価モデル。</div>

<script>
let DATA=null, curRace=null, curVenue=null, curFilter='all';
function confGrade(p){ if(p>=30)return'S';if(p>=20)return'A';if(p>=12)return'B';if(p>=6)return'C';return'D'; }
function wc(w){ return 'w'+(w||1); }
function pct(v){ return (v==null)?'—':v.toFixed(0); }

async function load(){
  try{ DATA=await (await fetch('predictions.json')).json(); }
  catch(e){ document.getElementById('raceList').innerHTML='<div class="empty"><div class="ic">⚠</div>predictions.json を読み込めませんでした。</div>'; return; }
  const d=DATA.date||'';
  document.getElementById('headDate').textContent=d?`${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}`:'';
  renderVenues();
}
function renderVenues(){
  const venues=[]; DATA.races.forEach(r=>{ if(!venues.includes(r.place)) venues.push(r.place); });
  curVenue=venues[0];
  document.getElementById('venuesIn').innerHTML=venues.map(v=>{
    const n=DATA.races.filter(r=>r.place===v).length;
    return `<button class="vtab ${v===curVenue?'on':''}" data-v="${v}">${v}<span class="cnt">${n}R</span></button>`;
  }).join('');
  document.querySelectorAll('.vtab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('.vtab').forEach(x=>x.classList.remove('on'));
    t.classList.add('on'); curVenue=t.dataset.v; window.scrollTo(0,0); renderList();
  }));
  renderList();
}
function renderList(){
  const box=document.getElementById('raceList');
  let venueRaces=DATA.races.filter(r=>r.place===curVenue)
    .sort((a,b)=>a.race_no-b.race_no);  // レース番号を数値順に
  // レース番号クイックナビ
  document.getElementById('rnav').innerHTML=venueRaces.map(r=>{
    const hot=r.recommendations?.some(x=>x.recommended);
    return `<button class="rnav-btn ${hot?'hot':''}" onclick="openRace('${r.race_id}')">${r.race_no}</button>`;
  }).join('');
  let races=venueRaces.filter(r=>{
    if(curFilter==='all') return true;
    if(curFilter==='hot') return r.recommendations?.some(x=>x.recommended);
    if(curFilter==='active') return r.recommendations?.length>0 && !r.skip;
    const top=[...r.horses].sort((a,b)=>b.p_ability-a.p_ability)[0];
    if(curFilter==='w30') return top && top.p_ability>=30;
    if(curFilter==='p60') return top && top.p_place>=60;
    return true;
  });
  if(!races.length){ box.innerHTML='<div class="empty"><div class="ic">○</div>該当レースなし</div>'; return; }
  box.innerHTML=races.map(r=>{
    const top3=[...r.horses].sort((a,b)=>b.p_ability-a.p_ability).slice(0,3);
    const hasHot=r.recommendations?.some(x=>x.recommended);
    const t3=top3.map(h=>{const g=confGrade(h.p_ability);
      return `<div class="t3row"><div class="conf ${g}">${g}</div><div class="umaban ${wc(h.waku)}">${h.umaban}</div><div class="t3name">${h.horse_name||'—'}</div><div class="t3rate"><b>${pct(h.p_ability)}</b>/${pct(h.p_place)}</div></div>`;
    }).join('');
    const badges=[];
    if(hasHot) badges.push('<span class="bdg hot">◎ 激熱</span>');
    if(r.skip) badges.push('<span class="bdg skip">見送り</span>');
    const axisN=r.horses.filter(h=>h.p_ability>=20).length;
    if(axisN>0&&!r.skip) badges.push(`<span class="bdg axis">軸${axisN}</span>`);
    return `<div class="rcard" onclick="openRace('${r.race_id}')"><div class="rcard-top"><div class="rno">${r.race_no}</div><div class="rmeta"><div class="nm">${r.grade||''}</div><div class="sub">${r.surface}${r.distance}m · ${r.atama}頭</div></div><div class="rtime"><div class="t">${r.start_time||'—'}</div><div class="lbl">発走</div></div></div><div class="top3">${t3}</div>${badges.length?`<div class="badges">${badges.join('')}</div>`:''}</div>`;
  }).join('');
}
function openRace(rid){ curRace=DATA.races.find(r=>r.race_id===rid); if(!curRace)return; renderDetail(); showView('detail'); window.scrollTo(0,0); }
function ringSVG(val,max,color){
  const r=18,c=2*Math.PI*r,off=c*(1-Math.max(0,Math.min(1,val/max)));
  return `<svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="${r}" fill="none" stroke="var(--line)" stroke-width="4"/><circle cx="22" cy="22" r="${r}" fill="none" stroke="${color}" stroke-width="4" stroke-dasharray="${c}" stroke-dashoffset="${off}" stroke-linecap="round" transform="rotate(-90 22 22)"/></svg>`;
}
function renderDetail(){
  const r=curRace;
  document.getElementById('detTitle').textContent=`${r.race_no}R ${r.grade||''}`;
  document.getElementById('detSub').textContent=`${r.place} ${r.surface}${r.distance}m · ${r.atama}頭 · ${r.baba||'良'} · 発走${r.start_time||'—'}`;
  const horses=[...r.horses].sort((a,b)=>b.p_ability-a.p_ability);
  document.getElementById('horseList').innerHTML=horses.map((h,i)=>{
    const g=confGrade(h.p_ability);
    const divG=(h.divergence!=null&&h.divergence>0);
    const evGood=(h.ev_tansho!=null&&h.ev_tansho>=1.05&&!h.ev_tansho_anomaly);
    const reason=h.reason?`<div class="hc-reason"><span class="tag">AI評価の根拠</span>${h.reason}</div>`:'';
    const kyaku=['逃','先','差','追'][h.prev_kyakushitsu];
    const stats=[h.prev_chakujun!=null?`前走<b>${h.prev_chakujun}着</b>`:'',h.prev_speed_index!=null?`SP<b>${h.prev_speed_index.toFixed(0)}</b>`:'',h.rest_weeks!=null?`<b>${h.rest_weeks}</b>週`:'',h.jockey?`${h.jockey}`:'',kyaku?`脚質<b>${kyaku}</b>`:''].filter(Boolean).map(s=>`<span class="stat">${s}</span>`).join('');
    const evbox=(h.tansho_odds!=null)?`<div class="hc-ev"><div class="evbox"><div class="k">単勝オッズ</div><div class="v">${h.tansho_odds.toFixed(1)}</div></div><div class="evbox ${evGood?'good':''}"><div class="k">単勝EV</div><div class="v">${h.ev_tansho!=null?h.ev_tansho.toFixed(2):'—'}</div></div><div class="evbox"><div class="k">市場乖離</div><div class="v" style="color:${divG?'var(--turf)':'var(--dim)'}">${h.divergence!=null?(h.divergence>0?'+':'')+(h.divergence*100).toFixed(0):'—'}</div></div></div>`:'';
    return `<div class="hcard"><div class="hcard-top"><div class="hc-rank">${i+1}</div><div class="umaban ${wc(h.waku)}">${h.umaban}</div><div class="hc-main"><div class="hc-name">${h.horse_name||'—'} <span class="conf ${g}" style="display:inline-flex;vertical-align:middle">${g}</span></div><div class="hc-info">${h.sex||''}${h.age||''} · 斤量${h.kinryo||'—'} · ${h.sire||''}</div></div><div class="dual"><div class="ring">${ringSVG(h.p_ability,35,'var(--turf)')}<div class="val" style="color:var(--turf)">${pct(h.p_ability)}</div><div class="lbl">能力</div></div><div class="ring">${ringSVG(h.p_place,100,'var(--gold)')}<div class="val" style="color:var(--gold)">${pct(h.p_place)}</div><div class="lbl">複勝</div></div></div></div>${reason}${stats?`<div class="hc-stats">${stats}</div>`:''}${evbox}</div>`;
  }).join('');
  const bb=document.getElementById('betBlock');
  if(r.skip||!r.recommendations?.length){
    bb.innerHTML='<div class="empty" style="padding:30px"><div class="ic">—</div>このレースは見送り推奨です</div>';
  }else{
    const byType={}; r.recommendations.forEach(rec=>{(byType[rec.bet_type]=byType[rec.bet_type]||[]).push(rec);});
    const order=['単勝','複勝','馬連','ワイド','三連複','三連単'];
    bb.innerHTML=order.filter(t=>byType[t]).map(t=>{
      const rows=byType[t].slice(0,6).map(rec=>{
        const evGood=rec.ev!=null&&rec.ev>=1.05;
        const sep=(t.startsWith('三連')||t==='馬連'||t==='ワイド')?'-':'';
        return `<div class="bet-row ${rec.recommended?'rec':''}"><span class="bet-combo">${rec.combination.join(sep)}</span><span class="bet-stat">的中${rec.hit_rate}%</span>${rec.odds!=null?`<span class="bet-stat">${rec.odds.toFixed(1)}倍</span>`:''}<span class="bet-ev ${evGood?'good':''}">${rec.ev!=null?'EV'+rec.ev.toFixed(2):'—'}</span></div>`;
      }).join('');
      return `<div class="bet-type-grp"><div class="bet-type-lbl">${t}</div>${rows}</div>`;
    }).join('');
  }
  // 馬柱を描画
  renderUmabashira(horses);
  // 詳細を開いたら評価モードに戻す
  setMode('eval');

  const sameVenue=DATA.races.filter(x=>x.place===r.place).sort((a,b)=>a.race_no-b.race_no);
  const vIdx=sameVenue.findIndex(x=>x.race_id===r.race_id);
  document.getElementById('prevR').onclick=()=>{ if(vIdx>0) openRace(sameVenue[vIdx-1].race_id); };
  document.getElementById('nextR').onclick=()=>{ if(vIdx<sameVenue.length-1) openRace(sameVenue[vIdx+1].race_id); };
}

// 馬柱（過去走を表形式で）
function renderUmabashira(horses){
  const maxPast=Math.max(1,...horses.map(h=>(h.past_races||[]).length));
  const nShow=Math.min(maxPast,5);  // 最大5走分
  let head='<tr><th class="horse-cell" style="left:0">馬</th>';
  for(let i=0;i<nShow;i++) head+=`<th>${i+1}走前</th>`;
  head+='</tr>';
  const rows=horses.map(h=>{
    const g=confGrade(h.p_ability);
    let cells='';
    const pr=h.past_races||[];
    for(let i=0;i<nShow;i++){
      const p=pr[i];
      if(!p){ cells+='<td class="past">—</td>'; continue; }
      const cls=p.chakujun===1?'chaku1':(p.chakujun<=3?'chaku23':'');
      cells+=`<td class="pr-cell">
        <div class="top"><span class="${cls}">${p.chakujun||'?'}着</span>/${p.atama||'?'}</div>
        <div class="bot">${p.place||''}${p.surface||''}${p.distance||''} ${p.baba||''}</div>
        <div class="bot">${p.ninki||'?'}人 上${p.agari||'?'} SP${p.speed_index?p.speed_index.toFixed(0):'?'}</div>
      </td>`;
    }
    return `<tr><td class="horse-cell">
      <div class="hn"><span class="umaban ${wc(h.waku)}">${h.umaban}</span>
      <span>${h.horse_name||'—'}</span><span class="conf ${g}">${g}</span></div></td>${cells}</tr>`;
  }).join('');
  document.getElementById('umabaBox').innerHTML=`<table class="umaba"><thead>${head}</thead><tbody>${rows}</tbody></table>`;
}

function setMode(m){
  document.getElementById('evalMode').style.display=(m==='eval')?'block':'none';
  document.getElementById('umaMode').style.display=(m==='uma')?'block':'none';
  document.getElementById('modeEval').classList.toggle('on',m==='eval');
  document.getElementById('modeUma').classList.toggle('on',m==='uma');
}
function showView(v){
  document.getElementById('list').style.display=(v==='list')?'block':'none';
  document.getElementById('detail').style.display=(v==='detail')?'block':'none';
  document.getElementById('venues').style.display=(v==='list')?'block':'none';
}
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on'); curFilter=c.dataset.f; renderList();
}));
load();
</script>
